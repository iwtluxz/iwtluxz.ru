  <style>
    :root {
      --bg: #09090c;
      --panel: rgba(27, 27, 27, 0.5);
      --panel-line: transparent;
      --text: #f5f5f7;
      --muted: rgba(255, 255, 255, 0.84);
      --shadow: 0 24px 64px rgba(0, 0, 0, 0.34);
    }

    @font-face {
      font-family: "Minecraft";
      src: url("font/minecraft.ttf") format("truetype");
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 24px;
      display: grid;
      place-items: center;
      place-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: "Minecraft", "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(0, 0, 0, 0.58), rgba(0, 0, 0, 0.58)),
        url("img/artem.gif?v=20260628b") center center / cover no-repeat;
      background-color: var(--bg);
      position: relative;
      isolation: isolate;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
    }

    body::before {
      inset: 0;
      z-index: -2;
      background: rgba(0, 0, 0, 0.01);
      backdrop-filter: blur(0.75px);
      -webkit-backdrop-filter: blur(0.75px);
    }

    body::after {
      inset: -12%;
      z-index: -1;
      background:
        radial-gradient(circle at 50% 50%, transparent 20%, rgba(0, 0, 0, 0.24) 62%, rgba(0, 0, 0, 0.58) 100%),
        linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.08) 14%, transparent 24%, transparent 76%, rgba(255, 255, 255, 0.06) 86%, transparent 100%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.42), transparent 40%, transparent 60%, rgba(0, 0, 0, 0.48));
      opacity: 0.4;
      filter: blur(12px);
    }

    body.no-js .entry-overlay {
      display: none;
    }

    body.no-js .panel,
    body.no-js .audio-toggle,
    body.is-entered .panel {
      opacity: 1;
      transform: none;
    }

    body.is-entered .audio-toggle {
      opacity: 1;
      transform: none;
      pointer-events: auto;
    }

    body:not(.is-entered):not(.no-js) .panel {
      opacity: 0;
      transform: translateY(8px) scale(0.985);
    }

    body:not(.is-entered):not(.no-js) .audio-toggle {
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
    }

    .entry-overlay {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      cursor: pointer;
      transition: opacity 900ms ease, visibility 900ms ease;
    }

    .entry-overlay::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.32) 70%);
      pointer-events: none;
    }

    .entry-overlay.is-hidden {
      opacity: 0;
      visibility: hidden;
    }

    .entry-button {
      position: relative;
      z-index: 1;
      border: 0;
      padding: 0;
      background: none;
      color: rgba(255, 255, 255, 0.97);
      font: inherit;
      font-size: clamp(22px, 2.2vw, 30px);
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      text-shadow: 0 0 28px rgba(0, 0, 0, 0.45);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .entry-button:hover,
    .entry-button:focus-visible {
      opacity: 0.9;
      transform: translateY(-1px);
      outline: none;
    }

    .panel {
      width: min(460px, calc(100vw - 48px));
      margin: auto;
      display: grid;
      justify-items: center;
      gap: 18px;
      position: relative;
      align-self: center;
      justify-self: center;
      transition: opacity 1200ms ease, transform 1200ms ease;
    }

    .identity {
      --identity-offset: 8px;
      display: grid;
      place-content: center;
      justify-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(var(--identity-offset));
    }

    .avatar {
      --avatar-offset: -10px;
      width: 114px;
      height: 114px;
      border-radius: 0;
      background: url("img/strelokkavatar.gif?v=20260630a") center center / contain no-repeat;
      box-shadow: none;
      position: relative;
      overflow: visible;
      cursor: default;
      outline: none;
      transform: translateY(var(--avatar-offset));
      margin-bottom: -10px;
      animation: avatar-drift 6.4s ease-in-out infinite;
    }

    .avatar::before {
      content: none;
    }

    .avatar::after {
      content: attr(data-hover);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%) translateY(6px);
      padding: 6px 9px;
      border-radius: 8px;
      background: rgba(12, 12, 16, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.92);
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.01em;
      white-space: nowrap;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.34);
      pointer-events: none;
      opacity: 0;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .avatar:hover::after,
    .avatar:focus-visible::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .name {
      margin: 0;
      font-size: clamp(26px, 4vw, 40px);
      line-height: 0.95;
      letter-spacing: -0.05em;
      font-weight: 700;
      color: var(--muted);
      text-shadow:
        0 0 6px rgba(255, 255, 255, 0.7),
        0 0 18px rgba(255, 255, 255, 0.5),
        0 0 34px rgba(255, 255, 255, 0.22);
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--name-lock-width, fit-content);
      min-height: var(--name-lock-height, auto);
    }

    .name::before {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: -5px;
      height: 10px;
      background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.34), transparent 70%);
      filter: blur(8px);
      opacity: 0.85;
      pointer-events: none;
      animation: name-glow 4.6s ease-in-out infinite;
    }

    .name-text {
      position: relative;
      display: inline-block;
      white-space: nowrap;
    }

    .trail-dots {
      display: inline-flex;
      align-items: center;
      position: relative;
      top: 0.08em;
      vertical-align: middle;
      margin-left: 0.16em;
      gap: 0.02em;
    }

    .trail-dot {
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.72em;
      letter-spacing: -0.08em;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.55);
      opacity: 0.2;
      animation: dot-sequence 0.95s ease-in-out infinite;
    }

    .trail-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .tagline-box {
      width: fit-content;
      max-width: calc(100vw - 56px);
      padding: 11px 18px;
      border-radius: 16px;
      background: rgba(18, 18, 22, 0.52);
      box-shadow:
        0 16px 36px rgba(0, 0, 0, 0.26),
        0 0 0 1px rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: box-breathe 6.8s ease-in-out infinite;
    }

    .tagline-box::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% -25%, rgba(255, 255, 255, 0.08), transparent 62%);
      pointer-events: none;
    }

    .tagline-box > * {
      position: relative;
      z-index: 1;
    }

    .tagline {
      margin: 0;
      text-align: center;
      white-space: nowrap;
      max-width: none;
      min-height: 0;
      font-size: clamp(11px, 1.05vw, 15px);
      line-height: 1.4;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 0 14px rgba(255, 255, 255, 0.16);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .tagline.is-swapping {
      opacity: 0.3;
      transform: translateY(2px);
    }

    .tagline:empty {
      display: none;
    }

    .socials {
      --socials-offset: -11px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 0;
      opacity: 0;
      transform: translateY(var(--socials-offset));
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 0;
      opacity: 0;
    }

    .social-link {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      color: rgba(255, 255, 255, 0.98);
      text-decoration: none;
      filter:
        drop-shadow(0 0 8px rgba(255, 255, 255, 0.7))
        drop-shadow(0 0 18px rgba(255, 255, 255, 0.52))
        drop-shadow(0 0 30px rgba(255, 255, 255, 0.34));
      transition: transform 180ms ease, filter 180ms ease;
    }

    body.is-entered .social-link {
      animation: social-enter 800ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    body.is-entered .social-link:nth-child(2) {
      animation-delay: 100ms;
    }

    body.is-entered .social-link:nth-child(3) {
      animation-delay: 180ms;
    }

    .social-link:hover,
    .social-link:focus-visible {
      transform: translateY(-2px);
      filter:
        drop-shadow(0 0 10px rgba(255, 255, 255, 0.82))
        drop-shadow(0 0 22px rgba(255, 255, 255, 0.62))
        drop-shadow(0 0 36px rgba(255, 255, 255, 0.42));
      outline: none;
    }

    .social-button {
      border: 0;
      padding: 0;
      background: none;
      cursor: pointer;
      font: inherit;
    }

    .social-link svg {
      width: 42px;
      height: 42px;
      fill: currentColor;
    }

    .social-link img {
      width: 42px;
      height: 42px;
      display: block;
      object-fit: contain;
      animation: icon-float 4.8s ease-in-out infinite;
    }

    .social-link:nth-child(2) img {
      animation-delay: 0.5s;
    }

    .social-link:nth-child(3) img {
      animation-delay: 1s;
    }

    .audio-toggle {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 4;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      padding: 0;
      border: 0;
      border-radius: 22px;
      background: rgba(16, 16, 20, 0.66);
      color: rgba(255, 255, 255, 0.96);
      cursor: pointer;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 16px 34px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.09);
      transition: background 160ms ease, transform 160ms ease, opacity 160ms ease;
    }

    .audio-toggle::before {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.14);
      opacity: 0;
      pointer-events: none;
    }

    .audio-toggle:hover,
    .audio-toggle:focus-visible {
      background: rgba(24, 24, 30, 0.82);
      transform: translateY(-1px);
      outline: none;
    }

    .audio-toggle svg {
      width: 30px;
      height: 30px;
      flex: 0 0 auto;
    }

    .audio-toggle [data-audio-label] {
      display: none;
    }

    .audio-toggle .audio-icon-speaker {
      fill: currentColor;
    }

    .audio-toggle .audio-icon-off {
      fill: none;
      stroke: currentColor;
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .audio-toggle.is-muted .audio-icon-off {
      opacity: 1;
    }

    .audio-toggle:not(.is-muted)::before {
      animation: audio-ring 2.8s ease-out infinite;
    }

    body.no-js .identity,
    body.no-js .tagline-box,
    body.no-js .socials,
    body.no-js .controls {
      opacity: 1;
      animation: none;
    }

    body.is-entered .identity {
      animation: identity-reveal 820ms cubic-bezier(0.2, 0.85, 0.2, 1) 70ms both;
    }

    body.is-entered .tagline-box {
      animation:
        block-reveal 820ms cubic-bezier(0.2, 0.85, 0.2, 1) 170ms both,
        box-breathe 6.8s ease-in-out 1s infinite;
    }

    body.is-entered .socials {
      animation: socials-reveal 860ms cubic-bezier(0.2, 0.85, 0.2, 1) 260ms both;
    }

    body.is-entered .controls {
      animation: block-reveal 860ms cubic-bezier(0.2, 0.85, 0.2, 1) 340ms both;
    }

    @keyframes dot-sequence {
      0%,
      20%,
      100% {
        opacity: 0.18;
        transform: translateY(0.08em);
      }
      35%,
      72% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes identity-reveal {
      from {
        opacity: 0;
        transform: translateY(calc(var(--identity-offset) + 24px)) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(var(--identity-offset)) scale(1);
      }
    }

    @keyframes block-reveal {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes name-glow {
      0%,
      100% {
        opacity: 0.5;
        filter: blur(8px);
      }
      50% {
        opacity: 1;
        filter: blur(12px);
      }
    }

    @keyframes avatar-drift {
      0%,
      100% {
        transform: translateY(var(--avatar-offset)) rotate(0deg) scale(1);
      }
      50% {
        transform: translateY(calc(var(--avatar-offset) - 5px)) rotate(-1.2deg) scale(1.02);
      }
    }

    @keyframes box-breathe {
      0%,
      100% {
        box-shadow:
          0 16px 36px rgba(0, 0, 0, 0.26),
          0 0 0 1px rgba(255, 255, 255, 0.07);
      }
      50% {
        box-shadow:
          0 18px 40px rgba(0, 0, 0, 0.3),
          0 0 0 1px rgba(255, 255, 255, 0.1),
          0 0 18px rgba(255, 255, 255, 0.06);
      }
    }

    @keyframes socials-reveal {
      from {
        opacity: 0;
        transform: translateY(calc(var(--socials-offset) + 22px)) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(var(--socials-offset)) scale(1);
      }
    }

    @keyframes social-enter {
      0% {
        opacity: 0;
        transform: translateY(18px) scale(0.9);
      }
      100% {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes audio-ring {
      0% {
        opacity: 0.42;
        transform: scale(0.9);
      }
      70%,
      100% {
        opacity: 0;
        transform: scale(1.16);
      }
    }

    @keyframes icon-float {
      0%,
      100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-2px) scale(1.03);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .entry-overlay {
        padding: 12px;
      }

      .panel {
        width: min(360px, calc(100vw - 24px));
        gap: 14px;
      }

      .identity {
        gap: 9px;
        --identity-offset: 4px;
        transform: translateY(var(--identity-offset));
      }

      .avatar {
        --avatar-offset: -7px;
        width: 102px;
        height: 102px;
        transform: translateY(var(--avatar-offset));
        margin-bottom: -8px;
      }

      .name {
        font-size: 32px;
      }

      .tagline-box {
        max-width: calc(100vw - 32px);
        padding: 10px 14px;
        border-radius: 14px;
      }

      .tagline {
        font-size: 10px;
      }

      .socials {
        --socials-offset: -12px;
        gap: 7px;
        margin-top: 0;
        transform: translateY(var(--socials-offset));
      }

      .social-link {
        width: 42px;
        height: 42px;
      }

      .social-link svg {
        width: 37px;
        height: 37px;
      }

      .social-link img {
        width: 37px;
        height: 37px;
      }

      .controls {
        gap: 8px;
        margin-top: 0;
      }

      .audio-toggle {
        top: 12px;
        left: 12px;
        width: 56px;
        height: 56px;
        border-radius: 18px;
      }

      .audio-toggle svg {
        width: 26px;
        height: 26px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }

      .trail-dot {
        opacity: 1;
        transform: none;
      }
    }

  <script>
    const bootstrapBody = document.body;
    const bootstrapOverlay = document.getElementById("entryOverlay");

    function revealFallbackUi() {
      bootstrapBody.classList.add("no-js", "is-entered");
      if (bootstrapOverlay) {
        bootstrapOverlay.classList.add("is-hidden");
      }
    }

    window.addEventListener("error", revealFallbackUi, { once: true });
    window.addEventListener("unhandledrejection", revealFallbackUi, { once: true });

    document.body.classList.remove("no-js");

    const bodyElement = document.body;
    const entryOverlay = document.getElementById("entryOverlay");
    const entryButton = document.getElementById("entryButton");
    const bgAudio = document.getElementById("bgAudio");
    const audioToggle = document.getElementById("audioToggle");
    const discordCopyButtons = document.querySelectorAll("[data-discord-copy]");
    const discordStatus = document.querySelector(".discord-card-status");
    const discordStatusText = document.querySelector("[data-discord-status-text]");
    const audioLabel = audioToggle ? audioToggle.querySelector("[data-audio-label]") : null;
    const trackToggleButton = document.getElementById("trackToggleButton");
    const trackPrevButton = document.getElementById("trackPrevButton");
    const trackNextButton = document.getElementById("trackNextButton");
    const trackVolume = document.getElementById("trackVolume");
    const trackTitle = document.querySelector("[data-track-title]");
    const trackCurrentTime = document.querySelector("[data-track-current]");
    const trackDuration = document.querySelector("[data-track-duration]");
    const trackProgressFill = document.querySelector("[data-track-progress]");
    const nameText = document.querySelector(".name-text");
    const nameElement = document.querySelector(".name");
    const fullName = nameText.dataset.text;
    const tabTitlePrefix = "strelokk";
    const tabTitleSuffix = " | iwtxz.ru";
    const prefersReducedMotion = typeof window.matchMedia === "function" && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const searchParams = typeof window.URLSearchParams === "function"
      ? new URLSearchParams(window.location.search)
      : { get: () => null };
    const shouldSkipEnter = searchParams.get("demo") === "1" || window.location.hash === "#demo";
    const isLocalFile = window.location.protocol === "file:";
    let audioTargetVolume = 0.45;
    const audioPreferenceKey = "iwtxz-strelokk-audio-enabled";
    const audioVolumeKey = "iwtxz-strelokk-audio-volume";
    const discordUserId = "958595335037542450";
    const discordAvatarRefreshMs = 60 * 1000;
    const discordAvatarTarget = document.querySelector("[data-discord-avatar-target]");
    const discordAvatarImage = document.querySelector("[data-discord-avatar-image]");
    const staticDiscordAvatarUrl = discordAvatarImage ? discordAvatarImage.getAttribute("src").split("?")[0] : "";
    const playlist = [
      { title: "whitek3d - STATUS", src: "sound/sound1.mp3" }
    ];
    let animationStarted = false;
    let audioFadeFrame = 0;
    let audioFadeRunId = 0;
    let audioFadeState = "idle";
    let audioShouldPlay = true;
    let audioIntentRunId = 0;
    let audioRetryListening = false;
    let currentTrackIndex = 0;

    function syncDiscordStatusTooltip() {
      if (!discordStatus || !discordStatusText) {
        return;
      }

      discordStatus.dataset.statusTooltip = discordStatusText.textContent.trim();
    }

    syncDiscordStatusTooltip();

    function readStoredAudioPreference() {
      try {
        const cachedValue = window.localStorage.getItem(audioPreferenceKey);
        if (cachedValue === "true") {
          return true;
        }
        if (cachedValue === "false") {
          return false;
        }
      } catch {}

      return true;
    }

    function writeStoredAudioPreference(shouldPlay) {
      try {
        window.localStorage.setItem(audioPreferenceKey, String(Boolean(shouldPlay)));
      } catch {}
    }

    function readStoredAudioVolume() {
      try {
        const cachedValue = Number(window.localStorage.getItem(audioVolumeKey));
        if (Number.isFinite(cachedValue)) {
          return Math.min(Math.max(cachedValue, 0), 1);
        }
      } catch {}

      return 0.45;
    }

    function writeStoredAudioVolume(value) {
      try {
        window.localStorage.setItem(audioVolumeKey, String(value));
      } catch {}
    }

    function syncVolumeControl() {
      if (!trackVolume) {
        return;
      }

      const percent = Math.round(audioTargetVolume * 100);
      trackVolume.value = String(percent);
      trackVolume.setAttribute("aria-valuetext", `${percent}%`);
    }

    async function fetchDiscordAvatar() {
      if (isLocalFile) {
        return null;
      }

      if (!window.location.hostname.includes("netlify")) {
        return staticDiscordAvatarUrl ? `${staticDiscordAvatarUrl}?v=${Date.now()}` : null;
      }

      const controller = typeof window.AbortController === "function" ? new AbortController() : null;
      const timeoutId = controller ? window.setTimeout(() => controller.abort(), 4500) : 0;

      try {
        const response = await fetch(`/api/discord/avatar/${discordUserId}`, {
          cache: "no-store",
          ...(controller ? { signal: controller.signal } : {})
        });

        if (!response.ok) {
          throw new Error("discord avatar unavailable");
        }

        const data = await response.json();
        return typeof data.avatarUrl === "string" ? data.avatarUrl : null;
      } catch {
        return null;
      } finally {
        if (timeoutId) {
          window.clearTimeout(timeoutId);
        }
      }
    }

    function preloadImage(src) {
      return new Promise((resolve, reject) => {
        if (!src) {
          reject(new Error("missing image"));
          return;
        }

        const image = new Image();
        const timeoutId = window.setTimeout(() => {
          image.onload = null;
          image.onerror = null;
          reject(new Error("image load timeout"));
        }, 3000);

        image.onload = () => {
          window.clearTimeout(timeoutId);
          resolve(src);
        };

        image.onerror = () => {
          window.clearTimeout(timeoutId);
          reject(new Error("image unavailable"));
        };

        image.src = src;
      });
    }

    async function syncDiscordAvatar() {
      const avatarUrl = await fetchDiscordAvatar();

      if (!avatarUrl || !discordAvatarTarget) {
        return;
      }

      try {
        await preloadImage(avatarUrl);
      } catch {
        return;
      }

      if (discordAvatarTarget) {
        discordAvatarTarget.style.backgroundImage = `url("${avatarUrl}")`;
      }

      if (discordAvatarImage) {
        discordAvatarImage.src = avatarUrl;
      }
    }

    function formatTrackTime(value) {
      if (!Number.isFinite(value) || value < 0) {
        return "0:00";
      }

      const minutes = Math.floor(value / 60);
      const seconds = Math.floor(value % 60).toString().padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function syncTrackMeta() {
      const activeTrack = playlist[currentTrackIndex];

      if (trackTitle && activeTrack) {
        trackTitle.textContent = activeTrack.title;
      }

      if (trackPrevButton) {
        trackPrevButton.disabled = true;
      }

      if (trackNextButton) {
        trackNextButton.disabled = true;
      }
    }

    function loadTrack(index, { autoplay = false } = {}) {
      if (!playlist.length || index < 0 || index >= playlist.length) {
        return;
      }

      currentTrackIndex = index;
      cancelAudioFade();
      setAudioRetryListening(false);
      bgAudio.pause();
      bgAudio.volume = 0;
      bgAudio.src = playlist[index].src;
      bgAudio.load();
      syncTrackMeta();
      syncTrackCard();

      if (autoplay && audioShouldPlay && bodyElement.classList.contains("is-entered")) {
        window.setTimeout(() => {
          applyAudioState({ fadeInDuration: 180 });
        }, 0);
      } else {
        syncAudioToggle();
      }
    }

    function syncTrackCard() {
      if (!trackCurrentTime || !trackDuration || !trackProgressFill || !trackToggleButton) {
        return;
      }

      const current = Number.isFinite(bgAudio.currentTime) ? bgAudio.currentTime : 0;
      const duration = Number.isFinite(bgAudio.duration) ? bgAudio.duration : 0;
      const progress = duration > 0 ? Math.min((current / duration) * 100, 100) : 0;
      const isPlaying = !bgAudio.paused && !bgAudio.ended;

      trackCurrentTime.textContent = formatTrackTime(current);
      trackDuration.textContent = formatTrackTime(duration);
      trackProgressFill.style.width = `${progress}%`;
      trackToggleButton.classList.toggle("is-paused", !isPlaying);
      trackToggleButton.setAttribute("aria-label", isPlaying ? "Pause track" : "Play track");
      syncTrackMeta();
    }

    function syncAudioToggle() {
      const playing = !bgAudio.paused && !bgAudio.ended;
      if (audioToggle) {
        audioToggle.classList.toggle("is-muted", !playing);
        audioToggle.setAttribute("aria-pressed", String(playing));
        audioToggle.setAttribute("aria-label", playing ? "Turn music off" : "Turn music on");
      }
      if (audioLabel) {
        audioLabel.textContent = playing ? "music on" : "music off";
      }
      syncTrackCard();
    }

    function cancelAudioFade() {
      audioFadeRunId += 1;
      if (audioFadeFrame) {
        window.cancelAnimationFrame(audioFadeFrame);
        audioFadeFrame = 0;
      }
      audioFadeState = "idle";
    }

    function retryAudioAfterInteraction() {
      if (!audioShouldPlay || !bodyElement.classList.contains("is-entered")) {
        setAudioRetryListening(false);
        return;
      }

      window.setTimeout(() => {
        if (audioShouldPlay && bodyElement.classList.contains("is-entered") && bgAudio.paused) {
          applyAudioState({ fadeInDuration: 240 });
        }
      }, 0);
    }

    function setAudioRetryListening(shouldListen) {
      if (audioRetryListening === shouldListen) {
        return;
      }

      audioRetryListening = shouldListen;
      const method = shouldListen ? "addEventListener" : "removeEventListener";

      window[method]("pointerdown", retryAudioAfterInteraction, true);
      window[method]("keydown", retryAudioAfterInteraction, true);
      window[method]("touchstart", retryAudioAfterInteraction, true);
      window[method]("click", retryAudioAfterInteraction, true);
    }

    function fadeAudioTo(targetVolume, duration, { playOnStart = false, pauseOnEnd = false } = {}) {
      cancelAudioFade();
      const runId = audioFadeRunId;
      const startVolume = bgAudio.volume;
      const startTime = performance.now();

      audioFadeState = targetVolume > startVolume ? "fading-in" : "fading-out";

      if (playOnStart && bgAudio.paused) {
        bgAudio.play().catch(() => {});
      }

      function step(now) {
        if (runId !== audioFadeRunId) {
          return;
        }

        const progress = Math.min((now - startTime) / duration, 1);
        bgAudio.volume = startVolume + (targetVolume - startVolume) * progress;

        if (progress < 1) {
          audioFadeFrame = window.requestAnimationFrame(step);
          return;
        }

        audioFadeFrame = 0;
        audioFadeState = "idle";
        bgAudio.volume = targetVolume;

        if (pauseOnEnd) {
          bgAudio.pause();
        } else {
          syncAudioToggle();
        }
      }

      audioFadeFrame = window.requestAnimationFrame(step);
    }

    async function applyAudioState({ fadeInDuration = 380, fadeOutDuration = 320 } = {}) {
      const intentRunId = ++audioIntentRunId;
      cancelAudioFade();

      if (!audioShouldPlay) {
        setAudioRetryListening(false);
        fadeAudioTo(0, fadeOutDuration, { pauseOnEnd: true });
        return;
      }

      if (bgAudio.paused) {
        if (Number.isFinite(bgAudio.duration) && bgAudio.duration > 0 && bgAudio.currentTime >= bgAudio.duration) {
          bgAudio.currentTime = 0;
        }

        bgAudio.volume = 0;

        try {
          await bgAudio.play();
          setAudioRetryListening(false);
        } catch {
          if (intentRunId !== audioIntentRunId) {
            return;
          }

          bgAudio.volume = 0;
          bgAudio.pause();
          setAudioRetryListening(true);
          syncAudioToggle();
          return;
        }
      }

      if (intentRunId !== audioIntentRunId) {
        if (!audioShouldPlay) {
          bgAudio.volume = 0;
          bgAudio.pause();
        }
        return;
      }

      fadeAudioTo(audioTargetVolume, fadeInDuration);
    }

    function lockNameSize() {
      const previousText = nameText.textContent;
      nameText.textContent = fullName;
      const { width, height } = nameElement.getBoundingClientRect();
      nameElement.style.setProperty("--name-lock-width", `${Math.ceil(width)}px`);
      nameElement.style.setProperty("--name-lock-height", `${Math.ceil(height)}px`);
      nameText.textContent = previousText;
    }

    function startNameAnimation() {
      if (animationStarted) {
        return;
      }
      animationStarted = true;

      nameText.textContent = fullName;

      if (!prefersReducedMotion) {
        nameElement.classList.add("is-animated");
      }
    }

    function startTabTitleAnimation() {
      if (prefersReducedMotion) {
        document.title = tabTitlePrefix + tabTitleSuffix;
        return;
      }

      let visibleCount = tabTitlePrefix.length;
      let deleting = true;

      function tickTitle() {
        document.title = tabTitlePrefix.slice(0, visibleCount) + tabTitleSuffix;

        let delay = deleting ? 120 : 145;

        if (deleting && visibleCount > 0) {
          visibleCount -= 1;
        } else if (deleting && visibleCount === 0) {
          deleting = false;
          delay = 300;
        } else if (!deleting && visibleCount < tabTitlePrefix.length) {
          visibleCount += 1;
        } else {
          deleting = true;
          delay = 1200;
        }

        window.setTimeout(tickTitle, delay);
      }

      tickTitle();
    }

    function startEntryButtonDots() {
      const dotFrames = [".", "..", "...", ".."];
      let dotFrameIndex = 0;

      entryButton.textContent = `click to enter${dotFrames[dotFrameIndex]}`;
      window.setInterval(() => {
        if (bodyElement.classList.contains("is-entered")) {
          return;
        }

        dotFrameIndex = (dotFrameIndex + 1) % dotFrames.length;
        entryButton.textContent = `click to enter${dotFrames[dotFrameIndex]}`;
      }, 420);
    }

    function enterSite() {
      if (bodyElement.classList.contains("is-entered")) {
        return;
      }
      bodyElement.classList.add("is-entered");
      entryOverlay.classList.add("is-hidden");
      syncAudioToggle();
      if (audioShouldPlay) {
        applyAudioState({ fadeInDuration: 650 });
      } else {
        cancelAudioFade();
        bgAudio.volume = 0;
        bgAudio.pause();
      }
      startNameAnimation();
    }

    if (audioToggle) {
      audioToggle.addEventListener("click", () => {
        audioShouldPlay = bgAudio.paused ? true : !audioShouldPlay;
        writeStoredAudioPreference(audioShouldPlay);
        syncAudioToggle();
        applyAudioState();
      });
    }

    if (trackToggleButton) {
      trackToggleButton.addEventListener("click", () => {
        audioShouldPlay = bgAudio.paused ? true : !audioShouldPlay;
        writeStoredAudioPreference(audioShouldPlay);
        syncAudioToggle();
        applyAudioState();
      });
    }

    if (trackVolume) {
      trackVolume.addEventListener("input", () => {
        audioTargetVolume = Math.min(Math.max(Number(trackVolume.value) / 100, 0), 1);
        writeStoredAudioVolume(audioTargetVolume);
        syncVolumeControl();

        if (!bgAudio.paused && audioShouldPlay) {
          cancelAudioFade();
          bgAudio.volume = audioTargetVolume;
        }
      });
    }

    bgAudio.addEventListener("play", syncAudioToggle);
    bgAudio.addEventListener("pause", syncAudioToggle);
    bgAudio.addEventListener("timeupdate", syncTrackCard);
    bgAudio.addEventListener("loadedmetadata", syncTrackCard);
    bgAudio.addEventListener("durationchange", syncTrackCard);
    bgAudio.addEventListener("emptied", syncTrackCard);
    bgAudio.addEventListener("ended", () => {
      audioShouldPlay = false;
      syncAudioToggle();
      syncTrackCard();
    });
    bgAudio.addEventListener("playing", () => {
      setAudioRetryListening(false);
    });
    window.addEventListener("resize", lockNameSize);
    document.addEventListener("visibilitychange", () => {
      if (document.hidden || !bodyElement.classList.contains("is-entered") || !audioShouldPlay || !bgAudio.paused) {
        return;
      }

      setAudioRetryListening(true);
      applyAudioState({ fadeInDuration: 220 });
    });
    window.addEventListener("pageshow", (event) => {
      if (!event.persisted || !bodyElement.classList.contains("is-entered") || !audioShouldPlay || !bgAudio.paused) {
        syncAudioToggle();
        return;
      }

      setAudioRetryListening(true);
      applyAudioState({ fadeInDuration: 280 });
    });

    discordCopyButtons.forEach((discordCopyButton) => {
      discordCopyButton.addEventListener("click", async () => {
        const discordName = discordCopyButton.dataset.discordCopy;

        try {
          await navigator.clipboard.writeText(discordName);
          discordCopyButton.setAttribute("title", "copied");
        } catch {
          discordCopyButton.setAttribute("title", discordName);
        }

        window.setTimeout(() => {
          discordCopyButton.setAttribute("title", discordName);
        }, 1200);
      });
    });

    entryOverlay.addEventListener("click", enterSite);
    entryButton.addEventListener("click", enterSite);
    window.addEventListener("keydown", (event) => {
      if (!bodyElement.classList.contains("is-entered") && (event.key === "Enter" || event.key === " ")) {
        event.preventDefault();
        enterSite();
      }
    });

    audioShouldPlay = readStoredAudioPreference();
    audioTargetVolume = readStoredAudioVolume();
    syncVolumeControl();
    lockNameSize();
    loadTrack(0);
    syncAudioToggle();
    syncDiscordAvatar();
    startEntryButtonDots();
    startTabTitleAnimation();

    if (shouldSkipEnter) {
      enterSite();
    }

    setAudioRetryListening(false);
    window.setInterval(syncDiscordAvatar, discordAvatarRefreshMs);
    window.removeEventListener("error", revealFallbackUi);
    window.removeEventListener("unhandledrejection", revealFallbackUi);
  </script>
</body>
</html>
